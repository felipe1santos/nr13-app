<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR-13 - Capa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: #000;
            background-color: #525659;
            margin: 0;
            padding: 0;
            line-height: 1.4;
            display: flex;
            justify-content: center;
        }

        .page {
            width: 210mm;
            min-height: 297mm;
            background-color: #fff;
            padding: 20mm 15mm 25mm 15mm;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           CABEÇALHO
           ========================================= */
        .top-line {
            border-top: 2px solid #000;
            width: 100%;
            margin: 0 0 18px 0;
        }

        .report-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            height: 55px;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-height: 100%;
            max-width: 220px;
            object-fit: contain;
        }

        /* =========================================
           CAIXA DE IDENTIFICAÇÃO (TAG)
           ========================================= */
        .tag-box {
            border: 2px solid #000;
            border-radius: 20px 0 20px 0;
            padding: 12px 30px;
            margin: 0 auto 35px auto;
            width: fit-content;
            min-width: 70%;
            text-align: center;
        }

        .tag-box h1 {
            font-size: 34px;
            font-weight: 900;
            color: #000;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* =========================================
           IMAGEM DO EQUIPAMENTO
           ========================================= */
        .cover-image-wrapper {
            width: 100%;
            max-width: 650px;
            height: 420px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .cover-image-wrapper img {
            /* width/height auto + max-* preserva o aspecto sem depender de object-fit,
               que o html2canvas ignora (esticava a foto na impressão/PDF). O flex centraliza. */
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* =========================================
           DESCRIÇÃO / SUBTÍTULO
           ========================================= */
        #capa-subtitulo {
            font-size: 28px;
            color: #000;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: -16px;
        }

        /* =========================================
           CAIXAS DE CLASSIFICAÇÃO NR-13
           ========================================= */
        .class-boxes {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .class-box {
            border: 1px solid #556ea4;
            border-radius: 6px;
            width: 110px;
            padding: 12px 10px;
            text-align: center;
        }

        .class-box-value {
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
        }

        .class-box-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000;
            margin-top: 6px;
        }

        /* =========================================
           RODAPÉ: DADOS DO RELATÓRIO E DO CLIENTE
           ========================================= */
        .capa-footer-info {
            position: absolute;
            bottom: 23mm;
            left: 15mm;
            right: 15mm;
            font-size: 11px;
            color: #000;
            line-height: 1.7;
        }

        .capa-footer-info strong {
            font-weight: 700;
        }

        /* =========================================
           COMPORTAMENTOS E IMPRESSÃO
           ========================================= */
        .hide-input { display: none; }

        @media screen {
            [contenteditable="true"]:hover {
                outline: 1px dashed #0051ff;
                background-color: #fffbdd;
                cursor: text;
            }
            .editable-image { cursor: pointer; transition: opacity 0.2s; }
            .editable-image:hover { opacity: 0.7; }
        }

        @media print {
            .no-print { display: none !important; }
            body { background: none; padding: 0; }
            .page {
                width: 100% !important;
                margin: 0 !important;
                box-shadow: none !important;
            }
            [contenteditable="true"]:hover { background-color: transparent !important; outline: none !important; }
        }
    </style>
</head>
<body>

    <input type="file" id="inputLogo" class="hide-input" accept="image/*" onchange="previewImage(this, 'imgLogo')">
    <input type="file" id="inputVessel" class="hide-input" accept="image/*" onchange="previewImage(this, 'imgVessel')">

    <div class="page">

        <div class="top-line"></div>

        <h1 class="report-title" contenteditable="true">Relatório de Inspeção de Segurança</h1>

        <div class="logo-container editable-image" onclick="document.getElementById('inputLogo').click()" title="Clique para alterar a Logo">
            <img id="imgLogo" src="logo.webp" alt="Logo da Empresa">
        </div>

        <div class="tag-box">
            <h1 id="capa-titulo" contenteditable="true">--</h1>
        </div>

        <div class="cover-image-wrapper editable-image" onclick="document.getElementById('inputVessel').click()" title="Clique para alterar a foto do equipamento">
            <img id="imgVessel" src="foto.webp" alt="Foto do Equipamento">
        </div>

        <h2 id="capa-subtitulo" contenteditable="true">--</h2>

        <div class="class-boxes">
            <div class="class-box">
                <div class="class-box-value" id="box-grupo">-</div>
                <div class="class-box-label">Grupo</div>
            </div>
            <div class="class-box">
                <div class="class-box-value" id="box-categoria">-</div>
                <div class="class-box-label">Categoria</div>
            </div>
            <div class="class-box">
                <div class="class-box-value" id="box-classe">-</div>
                <div class="class-box-label">Classe</div>
            </div>
        </div>

        <div class="capa-footer-info">
            <div><strong>Nº RELATÓRIO:</strong> <span id="capa-num-relatorio">-</span></div>
            <div><strong>DATA INSPEÇÃO:</strong> <span id="capa-data-inspecao">-</span></div>
            <div><strong>VALIDADE:</strong> <span id="capa-validade">-</span></div>
            <div><strong>SOLICITANTE:</strong> <span id="capa-solicitante">-</span></div>
            <div><strong>ENDEREÇO:</strong> <span id="capa-endereco-cliente">-</span></div>
        </div>

    </div>

    <script>
        // Função para alteração manual das imagens
        function previewImage(input, imgId) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(imgId).src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {

            const setVal = (id, val) => {
                const el = document.getElementById(id);
                if (el && val !== undefined && val !== null && val !== '') el.innerText = val;
            };

            const formatarDataBR = (str) => {
                if (!str) return null;
                const partes = str.split('-');
                if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
                return str;
            };

            // =========================================================
            // SCRIPT PARA PUXAR A LOGO DA EMPRESA INSPETORA
            // =========================================================
            const salvo = localStorage.getItem('nr13_minha_empresa');
            if (salvo) {
                const dados = JSON.parse(salvo);
                if (dados.logo) {
                    document.getElementById('imgLogo').src = dados.logo;
                }
            }

            // =========================================================
            // SCRIPT PARA PUXAR DADOS DO EQUIPAMENTO, CLASSIFICAÇÃO E RELATÓRIO
            // =========================================================
            const urlParams = new URLSearchParams(window.location.search);
            const tagAtual = urlParams.get('tag');

            if (tagAtual) {
                const info = JSON.parse(localStorage.getItem('nr13_info_' + tagAtual) || '{}');
                const cat = JSON.parse(localStorage.getItem('nr13_cat_' + tagAtual) || '{}');
                const calc = JSON.parse(localStorage.getItem('nr13_calc_' + tagAtual) || '{}');
                const emp = JSON.parse(localStorage.getItem('nr13_emp_' + tagAtual) || '{}');
                const fotos = JSON.parse(localStorage.getItem('nr13_fotos_' + tagAtual) || '[]');
                const meta = JSON.parse(localStorage.getItem('nr13_relatorio_meta_atual') || '{}');

                // Preenche TAG (Identificação)
                if(document.getElementById('capa-titulo')) {
                    const numTag = info.tag ? info.tag.toUpperCase() : tagAtual.toUpperCase();
                    document.getElementById('capa-titulo').innerText = numTag;
                }

                // Preenche Descrição (Fluido/Equipamento)
                if(document.getElementById('capa-subtitulo')) {
                    const textoFluido = cat.fluidoInput ? cat.fluidoInput : 'VISÃO GERAL DO EQUIPAMENTO';
                    document.getElementById('capa-subtitulo').innerText = textoFluido;
                }

                // Preenche a Foto de Capa
                let fotoSrc = "";
                let fotoCapa = fotos.find(f => f.isCapa);

                if (fotoCapa && fotoCapa.src) {
                    fotoSrc = fotoCapa.src;
                } else if (fotos.length > 0 && fotos[0].src) {
                    fotoSrc = fotos[0].src;
                } else {
                    let vasoSalvo = JSON.parse(localStorage.getItem('nr13_vaso_' + tagAtual) || "{}");
                    if (vasoSalvo && vasoSalvo.imagemPrint) fotoSrc = vasoSalvo.imagemPrint;
                }

                if (fotoSrc && document.getElementById('imgVessel')) {
                    document.getElementById('imgVessel').src = fotoSrc;
                }

                // =====================================================
                // CLASSIFICAÇÃO NR-13 (Grupo / Categoria / Classe)
                // =====================================================
                let pmta_mpa = parseFloat(calc.pmta) || 0;
                let vol_m3 = parseFloat(info.volume) || parseFloat(cat.volInput) || 0;
                let pv_mpa = pmta_mpa * vol_m3;

                let classe = cat.classe || 'A';
                let grupo = 5;
                if (pv_mpa >= 100) grupo = 1;
                else if (pv_mpa >= 30) grupo = 2;
                else if (pv_mpa >= 2.5) grupo = 3;
                else if (pv_mpa >= 1) grupo = 4;

                const tabCategoria = {
                    'A': {1:'I',  2:'I',   3:'II',  4:'III', 5:'III'},
                    'B': {1:'I',  2:'II',  3:'III', 4:'IV',  5:'IV'},
                    'C': {1:'I',  2:'II',  3:'III', 4:'IV',  5:'V'},
                    'D': {1:'II', 2:'III', 3:'IV',  4:'V',   5:'V'}
                };
                let categoriaFinal = tabCategoria[classe] ? tabCategoria[classe][grupo] : '--';

                setVal('box-grupo', grupo);
                setVal('box-categoria', categoriaFinal);
                setVal('box-classe', classe);

                // =====================================================
                // DADOS DO RELATÓRIO E DO CLIENTE/SOLICITANTE
                // =====================================================
                setVal('capa-num-relatorio', meta.codigo);
                setVal('capa-data-inspecao', formatarDataBR(meta.execucaoInspecao));
                setVal('capa-validade', formatarDataBR(meta.validade));
                setVal('capa-solicitante', emp.razaoSocial || emp.nome);

                let enderecoCliente = [];
                if (emp.endereco) enderecoCliente.push(emp.endereco);
                if (emp.bairro) enderecoCliente.push(emp.bairro);
                if (emp.localidade) enderecoCliente.push(emp.localidade);
                if (emp.cep) enderecoCliente.push('CEP ' + emp.cep);
                setVal('capa-endereco-cliente', enderecoCliente.join(' - '));
            }
        });
    </script>
</body>
</html>
