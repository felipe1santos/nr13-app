<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR-13 – Checklist de Inspeção (Parte 1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        :root {
            --text-dark: #111827; --blue-data: #0033a2; --green-ok: #16a34a;
            --red-fail: #dc2626; --gray-mid: #6b7280;
        }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background: #fff;
               font-size: 10px; line-height: 1.3; }
        .page { width: 100%; min-height: 297mm; background: #fff; margin: 0;
                padding: 12mm 15mm 28mm 15mm; position: relative;
                page-break-after: always; display: flex; flex-direction: column; }
        .hide-input { display: none; }

        /* CABEÇALHO */
        .header-table { width: 100%; border-collapse: collapse; border: 1px solid var(--text-dark); margin-bottom: 10px; }
        .header-table td { border: 1px solid var(--text-dark); vertical-align: middle; padding: 6px 10px; }
        .col-logo { width: 22%; text-align: center; }
        .col-logo img { max-width: 100%; max-height: 55px; object-fit: contain; display: block; margin: 0 auto; }
        .col-title { width: 53%; text-align: center; font-size: 13px; font-weight: 900; line-height: 1.4; }
        .col-info { width: 25%; padding-left: 10px; }
        .info-label { font-size: 9px; color: var(--text-dark); }
        .info-value { font-size: 11px; font-weight: 700; color: var(--blue-data); margin-top: 2px; margin-bottom: 5px; }
        .info-value:last-child { margin-bottom: 0; }

        /* CONTEÚDO */
        .content { flex: 1; padding-bottom: 26mm; }
        .section-title { font-size: 10px; font-weight: 900; text-transform: uppercase;
                         background: #f3f4f6; padding: 4px 8px; margin: 8px 0 6px; }

        /* TABELA DOCUMENTAÇÃO */
        .doc-table { width: 100%; border-collapse: collapse; font-size: 9.5px; }
        .doc-table th, .doc-table td { border: 1px solid #d1d5db; padding: 3px 5px; vertical-align: middle; }
        .doc-table thead th { background: #f3f4f6; font-weight: 800; text-transform: uppercase;
                               text-align: center; font-size: 8.5px; }
        .col-num { width: 24px; text-align: center; font-weight: 700; color: var(--gray-mid); }
        .col-doc { font-weight: 500; }
        .col-resp { width: 36px; text-align: center; }
        .col-foto-h { width: 56px; text-align: center; }

        /* RADIO CELL */
        .rc { display: inline-flex; align-items: center; justify-content: center;
              width: 15px; height: 15px; border: 1px solid #9ca3af; border-radius: 2px;
              cursor: pointer; background: #fff; transition: all 0.15s; }
        .rc.sim-checked { background: var(--green-ok); border-color: var(--green-ok); }
        .rc.nao-checked { background: var(--red-fail); border-color: var(--red-fail); }
        .rc.na-checked  { background: var(--gray-mid); border-color: var(--gray-mid); }
        .rc.sim-checked::after, .rc.nao-checked::after, .rc.na-checked::after {
            content: '✓'; color: #fff; font-size: 9px; font-weight: 900;
        }

        /* RODAPÉ */
        .pgr-footer { position: absolute; bottom: 10mm; left: 15mm; right: 15mm;
                       display: flex; align-items: flex-start; }
        .footer-line-wrapper { flex: 1; border-top: 3px solid #000; padding-top: 5px; text-align: center; }
        .company-details { font-size: 9.5px; color: #000; font-weight: 500; line-height: 1.4; }
        .footer-page-number { background: #000 !important; color: #fff !important; font-size: 18px;
                               font-weight: 400; padding: 5px 18px; margin-left: 10px;
                               display: flex; align-items: center; justify-content: center; }

        .editable-image { cursor: pointer; }
        @media screen { .editable-image:hover { outline: 2px dashed var(--blue-data); opacity: 0.85; } }
        @media print {
            .no-print { display: none !important; }
            body { background: none; margin: 0; }
            .page { margin: 0 !important; box-shadow: none !important; padding: 12mm 15mm 28mm 15mm !important; }
        }
    </style>
</head>
<body>

<input type="file" id="inputLogo" class="hide-input" accept="image/*" onchange="previewImage(this,'imgLogo')">

<div class="page">
    <table class="header-table">
        <tr>
            <td class="col-logo">
                <div class="editable-image" onclick="document.getElementById('inputLogo').click()" title="Clique para alterar a logo">
                    <img id="imgLogo" src="logo.webp" alt="Logo">
                </div>
            </td>
            <td class="col-title" contenteditable="true" spellcheck="false">
                RELATÓRIO DE INSPEÇÃO NR-13<br>VASO SOB PRESSÃO
            </td>
            <td class="col-info">
                <div class="info-label">Relatório nº.</div>
                <div class="info-value" id="hdr-rel-num" contenteditable="true" spellcheck="false">—</div>
                <div class="info-label">Data:</div>
                <div class="info-value" id="hdr-rel-data" contenteditable="true" spellcheck="false">—</div>
            </td>
        </tr>
    </table>

    <div class="content">
        <div class="section-title">1. Verificação da documentação existente na data da inspeção</div>

        <table class="doc-table">
            <thead>
                <tr>
                    <th class="col-num">#</th>
                    <th>Documento</th>
                    <th class="col-resp">Sim</th>
                    <th class="col-resp">Não</th>
                    <th class="col-resp">N.A.</th>
                </tr>
            </thead>
            <tbody id="doc-tbody"></tbody>
        </table>
    </div>

    <div class="pgr-footer">
        <div class="footer-line-wrapper">
            <div class="company-details" id="footer-empresa" contenteditable="true" spellcheck="false">
                <strong>NOME DA EMPRESA LTDA.</strong><br>
                Endereço • Bairro • Cidade/UF • CNPJ: 00.000.000/0000-00<br>
                Telef: (00) 0000-0000 • E-mail: contato@empresa.com.br
            </div>
        </div>
        <div class="footer-page-number" contenteditable="true">1</div>
    </div>
</div>

<script>
    var TAG = new URLSearchParams(window.location.search).get('tag') || '';

    var DOCS = [
        { id: 'ck-reg-seg',    label: 'Registro de segurança' },
        { id: 'ck-desenho',    label: 'Desenho do conjunto geral' },
        { id: 'ck-prontuario', label: 'Prontuário' },
        { id: 'ck-mem-calc',   label: 'Memória de cálculo da PMTA das partes do vaso de pressão' },
        { id: 'ck-rel-ini',    label: 'Relatório de inspeção inicial' },
        { id: 'ck-proj-inst',  label: 'Projeto de instalação do vaso de pressão' },
        { id: 'ck-manual-op',  label: 'Manual de operação para vasos de categoria I e II' },
        { id: 'ck-op-qualif',  label: 'Operador qualificado para operação de vasos de categoria I e II' },
        { id: 'ck-estagio',    label: 'Comprovante de estágio supervisionado' },
        { id: 'ck-laudo-th',   label: 'Laudo de teste hidrostático/pneumático' },
        { id: 'ck-cert-seg',   label: 'Certificados de calibração dos dispositivos de segurança, onde aplicável' },
        { id: 'ck-prog-insp',  label: 'Programa de inspeções com suas datas limites' },
        { id: 'ck-rec-ant',    label: 'Recomendações de inspeções anteriores e que não foram realizadas' },
        { id: 'ck-mapa-us',    label: 'Mapa de medição de espessuras por ultrassom' },
        { id: 'ck-art',        label: 'A.R.T. assinada (Anotação de Responsabilidade Técnica) do profissional habilitado responsável pela documentação/ensaios descritos acima' }
    ];

    function selectRC(el, rowId) {
        var row = document.getElementById('row-' + rowId);
        row.querySelectorAll('.rc').forEach(function(r) {
            r.classList.remove('sim-checked','nao-checked','na-checked');
        });
        var tipo = el.dataset.tipo;
        el.classList.add(tipo + '-checked');
    }

    function buildTable() {
        var tbody = document.getElementById('doc-tbody');
        DOCS.forEach(function(doc, i) {
            var fid = doc.id;
            var tr = document.createElement('tr');
            tr.id = 'row-' + fid;
            tr.innerHTML = '<td class="col-num">' + (i+1) + '</td>' +
                '<td class="col-doc">' + doc.label + '</td>' +
                '<td class="col-resp" onclick="selectRC(this.querySelector(\'.rc\'),\'' + fid + '\')"><span class="rc" data-tipo="sim"></span></td>' +
                '<td class="col-resp" onclick="selectRC(this.querySelector(\'.rc\'),\'' + fid + '\')"><span class="rc" data-tipo="nao"></span></td>' +
                '<td class="col-resp" onclick="selectRC(this.querySelector(\'.rc\'),\'' + fid + '\')"><span class="rc" data-tipo="na"></span></td>';
            tbody.appendChild(tr);
        });
    }

    function previewImage(input, imgId) {
        if (input.files && input.files[0]) {
            var r = new FileReader();
            r.onload = function(e) { document.getElementById(imgId).src = e.target.result; };
            r.readAsDataURL(input.files[0]);
        }
    }

    var MAPA_DOC = {
        'v51-registro-seguranca':      'ck-reg-seg',
        'v51-desenho-conjunto':        'ck-desenho',
        'v51-prontuario':              'ck-prontuario',
        'v51-memoria-calculo':         'ck-mem-calc',
        'v51-relatorio-insp-inicial':  'ck-rel-ini',
        'v51-projeto-instalacao':      'ck-proj-inst',
        'v51-manual-operacao':         'ck-manual-op',
        'v51-operador-qualificado':    'ck-op-qualif',
        'v51-comprovante-estagio':     'ck-estagio',
        'v51-laudo-th':                'ck-laudo-th',
        'v51-cert-calibracao':         'ck-cert-seg',
        'v51-programa-inspecoes':      'ck-prog-insp',
        'v51-recomendacoes-anteriores':'ck-rec-ant',
        'v51-mapa-espessuras':         'ck-mapa-us',
        'v51-art-assinada':            'ck-art'
    };

    function injetarDadosChecklist1() {
        try {
            var dados = JSON.parse(localStorage.getItem('nr13_inspecao_atual') || '{}');
            var cl = dados.checklist;
            if (!cl || !cl.respostas) return;
            var resp = cl.respostas;
            Object.keys(MAPA_DOC).forEach(function(fid) {
                var hid = MAPA_DOC[fid];
                var v = resp[fid];
                if (!v) return;
                var tipo = v === 'Existe' ? 'sim' : v === 'Não identificado' ? 'nao' : v === 'Não aplica' ? 'na' : null;
                if (!tipo) return;
                var row = document.getElementById('row-' + hid);
                if (!row) return;
                row.querySelectorAll('.rc').forEach(function(r) { r.classList.remove('sim-checked','nao-checked','na-checked'); });
                var alvo = row.querySelector('.rc[data-tipo="' + tipo + '"]');
                if (alvo) alvo.classList.add(tipo + '-checked');
            });
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', function() {
        buildTable();
        injetarDadosChecklist1();

        // Número da página
        var pg = new URLSearchParams(window.location.search).get('page');
        if (pg) { var el = document.querySelector('.footer-page-number'); if (el) el.innerText = pg.trim(); }

        // Empresa
        try {
            var salvo = localStorage.getItem('nr13_minha_empresa');
            if (salvo) {
                var d = JSON.parse(salvo);
                if (d.logo) document.getElementById('imgLogo').src = d.logo;
                var h = '<strong>' + (d.razao || d.fantasia || 'NOME DA EMPRESA') + '</strong><br>';
                var l2 = [d.endereco, d.bairro, (d.cidade && d.estado ? d.cidade+'/'+d.estado : ''), d.cnpj ? 'CNPJ: '+d.cnpj : ''].filter(Boolean);
                var l3 = [(d.telefone ? 'Telef: '+d.telefone : ''), (d.email ? 'E-mail: '+d.email : '')].filter(Boolean);
                if (l2.length) h += l2.join(' • ') + '<br>';
                if (l3.length) h += l3.join(' • ');
                document.getElementById('footer-empresa').innerHTML = h;
            }
        } catch(e) {}

        // Meta
        try {
            var meta = JSON.parse(localStorage.getItem('nr13_relatorio_meta_atual') || '{}');
            if (meta.codigo) document.getElementById('hdr-rel-num').textContent = meta.codigo;
            if (meta.emissao) document.getElementById('hdr-rel-data').textContent = meta.emissao;
        } catch(e) {}
    });
</script>
</body>
</html>
